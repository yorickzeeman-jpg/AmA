<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07122a"/>
      <stop offset="100%" style="stop-color:#0f2347"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8680a"/>
      <stop offset="100%" style="stop-color:#c95500"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="512" height="8" rx="4" fill="url(#accent)" opacity="0.8"/>
  <!-- A lettermark -->
  <text x="256" y="320" 
    font-family="Arial, sans-serif" 
    font-weight="900" 
    font-size="280" 
    fill="url(#accent)" 
    text-anchor="middle"
    letter-spacing="-10">A</text>
  <!-- AEB text -->
  <text x="256" y="420" 
    font-family="Arial, sans-serif" 
    font-weight="700" 
    font-size="72" 
    fill="rgba(255,255,255,0.7)" 
    text-anchor="middle" 
    letter-spacing="12">AEB</text>
  <!-- Bottom accent line -->
  <rect x="156" y="440" width="200" height="4" rx="2" fill="url(#accent)" opacity="0.5"/>
</svg>
